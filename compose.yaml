services:
  ollama:
    image: docker.io/ollama/ollama:rocm
    container_name: book-ollama
    devices:
      - /dev/kfd
      - /dev/dri
    security_opt:
      - label=disable # SELinux (Fedora) would otherwise block GPU access
    group_add:
      - keep-groups # rootless podman: keep the video and render groups
    volumes:
      - ollama:/root/.ollama
    # If the GPU is not detected, uncomment:
    # environment:
    #   HSA_OVERRIDE_GFX_VERSION: "12.0.1"
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: Containerfile
    container_name: book-agent
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      # gemma3:12b offers the best book knowledge and German quality at about
      # 10 GB of VRAM (never maxes out a 16 GB card). Alternative: qwen3:14b.
      MODEL: gemma3:12b
      # short pause = maximum search throughput, raise it to go easier on the GPU
      ITERATION_SLEEP: "10"
      # scoring passes per rating (averaged, reduces random noise)
      SCORER_PASSES: "2"
    volumes:
      - ./data:/data:Z
    restart: unless-stopped

volumes:
  # To reuse an already downloaded model volume from another project:
  #   ollama:
  #     external: true
  #     name: llm_ollama
  ollama:
