services:
  ollama:
    image: docker.io/ollama/ollama:rocm
    container_name: book-ollama
    devices:
      - /dev/kfd
      - /dev/dri
    security_opt:
      - label=disable # SELinux (Fedora) would otherwise block GPU access
    group_add:
      - keep-groups # rootless podman: keep the video and render groups
    volumes:
      - ollama:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434" # so the host-run agent can reach the re-ranker
    # If the GPU is not detected, uncomment:
    # environment:
    #   HSA_OVERRIDE_GFX_VERSION: "12.0.1"
    restart: unless-stopped

  # One-shot: computes both lists and exits.
  # Usage: podman-compose run --rm agent
  agent:
    build:
      context: .
      dockerfile: Containerfile
    container_name: book-agent
    depends_on:
      - ollama
    environment:
      # The LLM is only used to re-rank candidates against the reading wish.
      # Leave OLLAMA_HOST empty to run pure CF ranking without any LLM.
      OLLAMA_HOST: http://ollama:11434
      MODEL: gemma3:12b
      # candidates per list handed to the re-ranker (smaller = faster runs)
      POOL: "200"
      # re-ranker passes per rating (averaged, reduces random noise)
      SCORER_PASSES: "2"
    volumes:
      - ./data:/data:Z

volumes:
  # To reuse an already downloaded model volume from another project:
  #   ollama:
  #     external: true
  #     name: llm_ollama
  ollama:
